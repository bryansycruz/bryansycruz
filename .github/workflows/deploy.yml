name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the book
        run: jupyter-book build . --verbose

      - name: Verify build output
        run: |
          echo "=== Contenido de _build/ ==="
          ls -la _build/ || echo "ERROR: _build/ no existe"
          echo "=== Contenido de _build/html/ ==="
          ls -la _build/html/ || echo "ERROR: _build/html/ no existe"
          test -f _build/html/index.html || (echo "ERROR: index.html no encontrado" && exit 1)

      - name: Add .nojekyll
        run: touch _build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
